name: Create Test Release

on:
  push:
    tags:
      - testing_*

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '10.x.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"
      - name: Build
        run: |
          $ver = '${{ github.ref_name }}' -replace 'testing_'
          invoke-expression 'dotnet build --no-restore --configuration Debug --nologo -p:Version=$ver -p:FileVersion=$ver -p:AssemblyVersion=$ver'
      - name: Verify repo.json matches tag
        run: |
          $expected = '${{ github.ref_name }}' -replace 'testing_'
          $repo = (Get-Content -Raw './repo.json' | ConvertFrom-Json)[0]
          if ($repo.TestingAssemblyVersion -ne $expected) {
            Write-Error "repo.json TestingAssemblyVersion ($($repo.TestingAssemblyVersion)) does not match tag ($expected). Did testing.ps1 fail to commit?"
            exit 1
          }
      - name: Generate bin manifest from repo.json
        run: |
          $repo = Get-Content -Raw './repo.json' | ConvertFrom-Json
          $repo[0] | ConvertTo-Json -Depth 10 | Set-Content './TempoTerror/bin/Debug/TempoTerror.json'
      - name: Archive
        run: Compress-Archive -Path TempoTerror/bin/Debug/* -DestinationPath TempoTerror.zip
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          path: |
            ./TempoTerror/bin/Debug/*
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Tempo Terror ${{ github.ref }}
          draft: false
          prerelease: false
      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./TempoTerror.zip
          asset_name: TempoTerror.zip
          asset_content_type: application/zip

      - name: Write out repo.json
        run: |
          $verT = '${{ github.ref_name }}'
          $ver = $verT -replace 'testing_'
          $path = './repo.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json[0].TestingAssemblyVersion = $ver
          $json[0].LastUpdate = [int][double]::Parse((Get-Date -UFormat %s))
          $json[0].DownloadLinkTesting = $json.DownloadLinkTesting -replace '[^/]+/TempoTerror.zip',"$verT/TempoTerror.zip"
          $content = $json | ConvertTo-Json -AsArray
          set-content -Path $path -Value $content

      - name: Commit repo.json
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git branch -f main ${{ github.sha }}
          git checkout main
          git add repo.json
          git commit -m "[CI] Updating repo.json for ${{ github.ref_name }}" || true
          git push origin main
